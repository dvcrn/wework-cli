version: 2

project_name: wework

builds:
  - id: wework
    main: ./cmd/wework
    binary: wework
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 7
    ignore:
      - goos: windows
        goarch: arm
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - -s -w -buildid=

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    wrap_in_directory: false
    files: []

checksum:
  name_template: checksums.txt

release:
  github:
    owner: dvcrn
    name: wework-cli
  replace_existing_artifacts: true

homebrew_casks:
  - name: wework-cli
    binaries:
      - wework
    repository:
      owner: dvcrn
      name: formulas
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/dvcrn/wework-cli"
    description: "CLI tool for booking WeWork spaces"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch
